<div class="sidebar d-flex flex-column">
  
  <div class="sidebar-header">
    <div class="logo-container">
      <div class="logo-img-wrapper">
        <img src="assets/images/LogoAPP.jpg" alt="AgroApp" class="sidebar-logo" />
      </div>
      
    </div>
  </div>

  <nav class="sidebar-menu">
    <ul class="nav flex-column">
      @for (item of menuItems; track item.label) {
        <li class="nav-item">
          <a [routerLink]="item.route"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              class="nav-link">
            <span class="nav-icon">{{ item.icon }}</span>
            <span class="nav-label">{{ item.label }}</span>
            @if (item.hasSubmenu) {
              <span class="nav-arrow">
                <i class="bi bi-chevron-right"></i>
              </span>
            }
          </a>
        </li>
      }
    </ul>
  </nav>

  <div class="sidebar-footer">
    <button class="user-info w-100 border-0 bg-transparent text-start" (click)="logout()">
      <div class="user-avatar">🚪</div>
      <div class="user-details">
        <span class="user-name">Cerrar sesión</span>
        <span class="user-role">Salir del sistema</span>
      </div>
    </button>
  </div>

</div>
